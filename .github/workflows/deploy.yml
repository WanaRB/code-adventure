name: Build Godot Game and Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Export Godot Game & Deploy

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Export game
      - name: Export Godot Game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_project_path: ./
          export_debug: false
          cache: true

      # 3. Debug: cek output export
      - name: Debug export output
        run: |
          echo "=== build_directory output ==="
          echo "${{ steps.export.outputs.build_directory }}"
          echo "=== isi build_directory ==="
          ls -la "${{ steps.export.outputs.build_directory }}" || echo "FOLDER TIDAK DITEMUKAN"
          echo "=== subfolder Web di build_directory ==="
          ls -la "${{ steps.export.outputs.build_directory }}/Web" || echo "SUBFOLDER Web TIDAK ADA"

      # 4. Salin hasil export ke builds/web
      - name: Copy export output to builds/web
        run: |
          mkdir -p builds/web
          cp -r "${{ steps.export.outputs.build_directory }}/Web/." builds/web/

      # 5. Debug: cek isi builds/web setelah copy
      - name: Debug builds/web after copy
        run: |
          echo "=== pwd saat ini ==="
          pwd
          echo "=== isi repo root ==="
          ls -la
          echo "=== isi builds/ ==="
          ls -la builds || echo "builds TIDAK ADA"
          echo "=== isi builds/web ==="
          ls -la builds/web || echo "builds/web TIDAK ADA"

      # 6. Buat vercel.json di builds/web
      - name: Create vercel.json
        run: |
          cat > builds/web/vercel.json << 'EOF'
          {
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "Cross-Origin-Embedder-Policy", "value": "require-corp" },
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" }
                ]
              }
            ]
          }
          EOF
          echo "=== vercel.json berhasil dibuat ==="
          cat builds/web/vercel.json

      # 7. Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 8. Pull konfigurasi Vercel
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 9. Debug: cek .vercel yang dibuat oleh vercel pull
      - name: Debug .vercel files
        run: |
          echo "=== .vercel di repo root ==="
          ls -la .vercel || echo ".vercel TIDAK ADA di root"
          echo "=== isi .vercel/project.json ==="
          cat .vercel/project.json || echo "project.json TIDAK ADA"
          echo "=== .vercel di dalam builds/web ==="
          ls -la builds/web/.vercel || echo ".vercel TIDAK ADA di builds/web"
          echo "=== isi vercel.json di builds/web ==="
          cat builds/web/vercel.json || echo "vercel.json TIDAK ADA"

      # 10. Deploy ke Vercel - DINONAKTIFKAN DULU untuk debug
      - name: Deploy to Vercel
        if: false
        run: echo "skip deploy untuk debugging"
