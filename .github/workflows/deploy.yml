name: Build Godot Game and Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Export Godot Game & Deploy

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Export game menggunakan Godot 4.6.2
      - name: Export Godot Game
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz"
          relative_project_path: ./
          export_debug: false
          cache: true

      # 3. Salin hasil export ke folder builds/web
      - name: Copy export output to builds/web
        run: |
          mkdir -p builds/web
          cp -r "${{ steps.export.outputs.build_directory }}/Web/." builds/web/

      # 3b. Inject mobile fullscreen support into HTML
      - name: Inject mobile fullscreen support
        run: |
          python3 - << 'PYEOF'
          import re

          with open("builds/web/index.html", "r", encoding="utf-8") as f:
              html = f.read()

          fullscreen_meta = '''
          \t\t<meta name="mobile-web-app-capable" content="yes">
          \t\t<meta name="apple-mobile-web-app-capable" content="yes">
          \t\t<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
          \t\t<meta name="theme-color" content="#000000">'''

          fullscreen_js = '''
          \t\t<script>
          \t\t// Auto-request fullscreen on first touch (mobile fullscreen)
          \t\t(function() {
          \t\t\tvar _fsRequested = false;
          \t\t\tfunction _requestFullscreen() {
          \t\t\t\tif (_fsRequested) return;
          \t\t\t\t_fsRequested = true;
          \t\t\t\tvar el = document.documentElement;
          \t\t\t\tvar req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
          \t\t\t\tif (req) req.call(el).catch(function(){});
          \t\t\t\t// Scroll to hide browser address bar
          \t\t\t\twindow.scrollTo(0, 1);
          \t\t\t}
          \t\t\tdocument.addEventListener("touchstart", _requestFullscreen, {once: true, passive: true});
          \t\t\tdocument.addEventListener("click", _requestFullscreen, {once: true});
          \t\t})();
          \t\t</script>'''

          # Fix viewport meta to include viewport-fit=cover for notch support
          html = re.sub(
              r'(<meta name="viewport"[^>]*content=")[^"]*(")',
              r'\1width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover\2',
              html
          )

          # Inject before </head>
          html = html.replace("</head>", fullscreen_meta + "\n" + fullscreen_js + "\n\t</head>", 1)

          # Add safe-area-inset CSS for notch phones
          body_style = """
          body {
          \tpadding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
          }
          #canvas {
          \twidth: 100vw !important;
          \theight: 100vh !important;
          }"""
          html = html.replace("</style>", body_style + "\n\t</style>", 1)

          with open("builds/web/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print("Mobile fullscreen injected successfully")
          PYEOF

      # 4. Tambahkan vercel.json untuk header CORS (wajib untuk Godot WebAssembly)
      - name: Create vercel.json
        run: |
          cat > builds/web/vercel.json << 'EOF'
          {
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "Cross-Origin-Embedder-Policy", "value": "require-corp" },
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" }
                ]
              }
            ]
          }
          EOF

      # 5. Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 6. Pull konfigurasi Vercel (mengambil Root Directory = builds/web, dll.)
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # 7. Deploy ke Vercel dari root repo
      #    Vercel akan memakai Root Directory = builds/web dari .vercel/project.json
      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
